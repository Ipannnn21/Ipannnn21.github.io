<!DOCTYPE html>
<!-- tes-->
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ipannnn21</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0d1117;
color:#e6edf3;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial;
}

.github-card{
background:#161b22;
border:1px solid #30363d;
border-radius:6px;
}

.repo-card{
background:#161b22;
border:1px solid #30363d;
border-radius:6px;
transition:.2s;
}

.repo-card:hover{
border-color:#58a6ff;
}

</style>

</head>

<body>

<div class="max-w-5xl mx-auto p-6">

<!-- PROFILE -->

<div id="profile" class="flex items-center gap-6 mb-8"></div>

<!-- REPOS -->

<div class="github-card p-6 mb-8">

<h2 class="text-lg mb-4 font-semibold">Repositories</h2>

<div id="repos" class="grid md:grid-cols-2 gap-4"></div>

</div>

<!-- CONTRIBUTION GRAPH -->

<div class="github-card p-6 mb-8">

<h2 class="text-lg mb-4 font-semibold">Contribution Graph</h2>

<div id="contrib"></div>

</div>

<!-- ACTIVITY -->

<div class="github-card p-6">

<h2 class="text-lg mb-4 font-semibold">Contribution activity</h2>

<div id="activity" class="space-y-6"></div>

</div>

</div>

<script>

const user="Ipannnn21"

async function profile(){

const res=await fetch(`https://api.github.com/users/${user}`)
const data=await res.json()

document.getElementById("profile").innerHTML=`

<img src="${data.avatar_url}" class="w-20 h-20 rounded-full border border-gray-700">

<div>

<h1 class="text-2xl font-bold">${data.login}</h1>

<p class="text-gray-400">${data.bio ?? ""}</p>

<p class="text-sm text-gray-500 mt-1">
${data.followers} followers · ${data.public_repos} repositories
</p>

</div>

`

}

async function repos(){

const res=await fetch(`https://api.github.com/users/${user}/repos?sort=updated`)
const data=await res.json()

let html=""

data.slice(0,6).forEach(repo=>{

html+=`

<a href="${repo.html_url}" target="_blank" class="repo-card p-4 block">

<div class="font-semibold text-blue-400">${repo.name}</div>

<div class="text-sm text-gray-400 mt-1">
${repo.description ?? "No description"}
</div>

<div class="text-xs text-gray-500 mt-3">
⭐ ${repo.stargazers_count} · ${repo.language ?? ""}
</div>

</a>

`

})

document.getElementById("repos").innerHTML=html

}

async function contributions(){

const url=`https://github.com/users/${user}/contributions`

const res=await fetch(url)
const svg=await res.text()

document.getElementById("contrib").innerHTML=svg

}

async function activity(){

const res=await fetch(`https://api.github.com/users/${user}/events/public`)
const data=await res.json()

let html=""

data.slice(0,10).forEach(e=>{

let action="Activity"

if(e.type==="PushEvent") action="Pushed commits"
if(e.type==="CreateEvent") action="Created repository"
if(e.type==="WatchEvent") action="Starred repository"

html+=`

<div class="flex gap-4">

<div class="w-2 bg-gray-700"></div>

<div>

<div class="text-sm text-gray-300">
${action}
</div>

<div class="text-blue-400 text-sm">
${e.repo.name}
</div>

<div class="text-xs text-gray-500">
${new Date(e.created_at).toLocaleDateString()}
</div>

</div>

</div>

`

})

document.getElementById("activity").innerHTML=html

}

profile()
repos()
contributions()
activity()

</script>

</body>
</html>
